<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shy Flower · Friendship Garden</title>
    
    <!-- Link to CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main game container -->
    <div id="game-container">
        <!-- The shy flower -->
        <div id="shy-flower">
            <div class="flower-face">🌸</div>
            <div class="flower-eyes">
                <span class="eye">◕</span>
                <span class="eye">◕</span>
            </div>
            <div class="flower-mouth">👄</div>
        </div>

        <!-- Attempt counter -->
        <div id="attempt-counter">
            <span id="attempt-number">0</span> attempts
        </div>

        <!-- Celebration message (hidden at start) -->
        <div id="celebration-message" class="hidden">
            <h2>✨ You caught me! ✨</h2>
            <p>Tap any flower for a secret message</p>
        </div>
    </div>

    <!-- Link to JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
